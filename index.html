<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>專屬網址管理員</title>
    <style>
        :root {
            /* 抽換為深色系變數配置 */
            --primary-color: #58a6ff;
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --text-main: #c9d1d9;
            --text-muted: #8b949e;
            --border-color: #30363d;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            padding: 2rem;
            margin: 0;
        }
        .container {
            background-color: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 600px;
            padding: 2rem;
            border: 1px solid var(--border-color);
        }
        h1 {
            text-align: center;
            color: var(--primary-color);
            margin-bottom: 1.5rem;
        }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 2rem;
        }
        input[type="text"], input[type="url"] {
            padding: 0.8rem;
            background-color: var(--bg-color);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 1rem;
        }
        input::placeholder {
            color: var(--text-muted);
        }
        input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 1px var(--primary-color);
        }
        button {
            background-color: var(--primary-color);
            color: #0d1117;
            border: none;
            padding: 0.8rem;
            border-radius: 6px;
            font-size: 1rem;
            cursor: pointer;
            transition: background-color 0.3s ease;
            font-weight: 600;
        }
        button:hover {
            background-color: #1f6feb;
            color: #ffffff;
        }
        .link-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .link-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
            border-bottom: 1px solid var(--border-color);
            transition: background-color 0.2s ease;
        }
        .link-item:last-child {
            border-bottom: none;
        }
        .link-item:hover {
            background-color: #21262d;
            border-radius: 6px;
        }
        .link-name {
            font-weight: bold;
            color: var(--primary-color);
            text-decoration: none;
            font-size: 1.1rem;
        }
        .link-name:hover {
            text-decoration: underline;
        }
        .delete-btn {
            background-color: #da3633;
            color: #ffffff;
            padding: 0.4rem 0.8rem;
            font-size: 0.9rem;
            border-radius: 6px;
        }
        .delete-btn:hover {
            background-color: #b3261e;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>專屬網址管理員</h1>
    
    <div class="input-group">
        <input type="text" id="linkName" placeholder="請輸入自訂名稱 (例如：Google、我的專題)" required>
        <input type="url" id="linkUrl" placeholder="請貼上完整網址 (包含 http:// 或 https://)" required>
        <button onclick="addLink()">新增網址</button>
    </div>

    <ul class="link-list" id="linkList">
        </ul>
</div>

<script>
    document.addEventListener("DOMContentLoaded", renderLinks);

    function addLink() {
        const nameInput = document.getElementById('linkName');
        const urlInput = document.getElementById('linkUrl');
        const name = nameInput.value.trim();
        const url = urlInput.value.trim();

        if (name === "" || url === "") {
            alert("請完整輸入名稱與網址！");
            return;
        }

        if (!url.startsWith('http://') && !url.startsWith('https://')) {
            alert("網址必須以 http:// 或 https:// 開頭！");
            return;
        }

        const links = getLinks();
        links.push({ id: Date.now(), name: name, url: url });
        localStorage.setItem('myLinks', JSON.stringify(links));

        nameInput.value = '';
        urlInput.value = '';
        renderLinks();
    }

    function deleteLink(id) {
        let links = getLinks();
        links = links.filter(link => link.id !== id);
        localStorage.setItem('myLinks', JSON.stringify(links));
        renderLinks();
    }

    function getLinks() {
        const linksJson = localStorage.getItem('myLinks');
        return linksJson ? JSON.parse(linksJson) : [];
    }

    function renderLinks() {
        const linkList = document.getElementById('linkList');
        const links = getLinks();
        linkList.innerHTML = '';

        if (links.length === 0) {
            linkList.innerHTML = '<li style="text-align: center; color: var(--text-muted); border: none;">目前尚無網址，請從上方新增。</li>';
            return;
        }

        links.forEach(link => {
            const li = document.createElement('li');
            li.className = 'link-item';
            
            li.innerHTML = `
                <a href="${link.url}" target="_blank" class="link-name">${link.name}</a>
                <button class="delete-btn" onclick="deleteLink(${link.id})">刪除</button>
            `;
            linkList.appendChild(li);
        });
    }
</script>

</body>
</html>
