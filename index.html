<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>專屬網址管理員</title>
    <style>
        :root {
            /* 抽換為深色系變數配置 */
            --primary-color: #58a6ff;
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --text-main: #c9d1d9;
            --text-muted: #8b949e;
            --border-color: #30363d;
            --danger-color: #f85149;
        }
        * {
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            padding: 2rem;
            margin: 0;
        }
        .container {
            background-color: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 600px;
            padding: 2rem;
            border: 1px solid var(--border-color);
            transition: max-width 0.3s ease; /* 點擊預覽時平滑拓寬容器 */
        }
        h1 {
            font-size: 1.8rem;
            margin-top: 0;
            margin-bottom: 1.5rem;
            text-align: center;
            color: var(--primary-color);
        }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            margin-bottom: 2rem;
        }
        input {
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-main);
            padding: 0.75rem;
            font-size: 1rem;
            width: 100%;
            transition: border-color 0.2s;
        }
        input:focus {
            outline: none;
            border-color: var(--primary-color);
        }
        button {
            background-color: #238636;
            color: #ffffff;
            border: 1px solid rgba(240,246,252,0.1);
            border-radius: 6px;
            padding: 0.75rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: #2ea44f;
        }
        .link-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .link-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 0;
            border-bottom: 1px solid var(--border-color);
        }
        .link-item:last-child {
            border-bottom: none;
        }
        .link-name {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 500;
            font-size: 1.1rem;
            cursor: pointer;
        }
        .link-name:hover {
            text-decoration: underline;
        }
        .btn-delete {
            background-color: transparent;
            color: var(--danger-color);
            border: 1px solid var(--danger-color);
            padding: 0.4rem 0.8rem;
            font-size: 0.85rem;
            border-radius: 6px;
            cursor: pointer;
        }
        .btn-delete:hover {
            background-color: var(--danger-color);
            color: #ffffff;
        }

        /* 新增：網頁內嵌預覽區塊樣式 */
        .preview-card {
            margin-top: 2rem;
            border-top: 1px solid var(--border-color);
            padding-top: 1.5rem;
            display: none;
        }
        .preview-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }
        .preview-title {
            color: var(--primary-color);
            font-weight: 600;
            font-size: 1.1rem;
        }
        .preview-actions {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .preview-actions a {
            color: var(--text-muted);
            font-size: 0.85rem;
            text-decoration: none;
        }
        .preview-actions a:hover {
            color: var(--primary-color);
            text-decoration: underline;
        }
        .btn-close {
            background-color: transparent;
            color: var(--text-muted);
            border: 1px solid var(--border-color);
            padding: 0.25rem 0.5rem;
            font-size: 0.85rem;
            border-radius: 4px;
            cursor: pointer;
        }
        .btn-close:hover {
            background-color: #21262d;
            color: var(--text-main);
        }
        iframe {
            width: 100%;
            height: 500px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background-color: #ffffff;
        }
        .warning-text {
            color: var(--text-muted);
            font-size: 0.8rem;
            margin-top: 0.5rem;
            line-height: 1.4;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>專屬網址管理員</h1>
    
    <div class="input-group">
        <input type="text" id="linkName" placeholder="輸入網址名稱 (例如: Google)">
        <input type="text" id="linkUrl" placeholder="輸入網址 URL (例如: https://www.google.com)">
        <button onclick="addLink()">新增網址</button>
    </div>

    <ul id="linkList" class="link-list">
        </ul>

    <div id="previewCard" class="preview-card">
        <div class="preview-header">
            <span id="previewTitle" class="preview-title">網頁預覽</span>
            <div class="preview-actions">
                <a id="openExternalBtn" href="#" target="_blank">在新分頁開啟 ↗</a>
                <button class="btn-close" onclick="closePreview()">✕ 關閉預覽</button>
            </div>
        </div>
        <iframe id="previewIframe" src=""></iframe>
        <div class="warning-text">
            💡 提示：若上方視窗顯示空白或拒絕連線，代表該網站設定了安全防護（禁止嵌入），請點選右上角「在新分頁開啟」。
        </div>
    </div>
</div>

<script>
    // 確保 DOM 完全載入後，自動讀取並渲染 localStorage 的資料
    document.addEventListener('DOMContentLoaded', function() {
        renderLinks();
    });

    function addLink() {
        const nameInput = document.getElementById('linkName');
        const urlInput = document.getElementById('linkUrl');
        
        const name = nameInput.value.trim();
        let url = urlInput.value.trim();

        if (!name || !url) {
            alert("請填寫完整的名稱與網址！");
            return;
        }

        // 自動幫漏填 http 的網址補上協定
        if (!/^https?:\/\//i.test(url)) {
            url = 'https://' + url;
        }

        const links = getLinks();
        links.push({ id: Date.now(), name: name, url: url });
        localStorage.setItem('myLinks', JSON.stringify(links));

        nameInput.value = '';
        urlInput.value = '';
        
        // 自動聚焦回名稱輸入框，方便連續輸入
        nameInput.focus();
        
        renderLinks();
    }

    function deleteLink(id) {
        let links = getLinks();
        links = links.filter(link => link.id !== id);
        localStorage.setItem('myLinks', JSON.stringify(links));
        
        // 若刪除的正是目前在預覽的網址，則關閉預覽
        closePreview();
        renderLinks();
    }

    function getLinks() {
        try {
            const linksJson = localStorage.getItem('myLinks');
            return linksJson ? JSON.parse(linksJson) : [];
        } catch (e) {
            console.error("無法自 localStorage 讀取資料", e);
            return [];
        }
    }

    function renderLinks() {
        const linkList = document.getElementById('linkList');
        if (!linkList) return; 
        
        const links = getLinks();
        linkList.innerHTML = '';

        if (links.length === 0) {
            linkList.innerHTML = '<li style="text-align: center; color: var(--text-muted); border: none; padding: 1rem 0;">目前尚無網址，請從上方新增。</li>';
            return;
        }

        links.forEach(link => {
            const li = document.createElement('li');
            li.className = 'link-item';
            
            // 安全性優化：改採用標準 DOM 事件監聽，避免引號破壞屬性常規
            const a = document.createElement('a');
            a.className = 'link-name';
            a.textContent = link.name;
            a.addEventListener('click', function() {
                openPreview(link.url, link.name);
            });

            const btn = document.createElement('button');
            btn.className = 'btn-delete';
            btn.textContent = '刪除';
            btn.addEventListener('click', function() {
                deleteLink(link.id);
            });

            li.appendChild(a);
            li.appendChild(btn);
            linkList.appendChild(li);
        });
    }

    // 新增：開啟內嵌預覽
    function openPreview(url, name) {
        const container = document.querySelector('.container');
        const previewCard = document.getElementById('previewCard');
        const previewIframe = document.getElementById('previewIframe');
        const previewTitle = document.getElementById('previewTitle');
        const openExternalBtn = document.getElementById('openExternalBtn');

        previewTitle.textContent = `預覽：${name}`;
        previewIframe.src = url;
        openExternalBtn.href = url;

        // 打開預覽時，將主容器拓寬至 900px 以獲得更好的瀏覽體驗
        container.style.maxWidth = '900px';
        previewCard.style.display = 'block';
    }

    // 新增：關閉內嵌預覽
    function closePreview() {
        const container = document.querySelector('.container');
        const previewCard = document.getElementById('previewCard');
        const previewIframe = document.getElementById('previewIframe');

        previewIframe.src = '';
        container.style.maxWidth = '600px';
        previewCard.style.display = 'none';
    }
</script>

</body>
</html>
