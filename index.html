<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>專屬網址管理員</title>
    <style>
        :root {
            /* 抽換為深色系變數配置 */
            --primary-color: #58a6ff;
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --text-main: #c9d1d9;
            --text-muted: #8b949e;
            --border-color: #30363d;
            --danger-color: #f85149;
        }
        * {
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            padding: 2rem;
            margin: 0;
        }
        .container {
            background-color: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 600px;
            padding: 2rem;
            border: 1px solid var(--border-color);
        }
        h1 {
            font-size: 1.8rem;
            margin-top: 0;
            margin-bottom: 1.5rem;
            text-align: center;
            color: var(--primary-color);
        }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            margin-bottom: 2rem;
        }
        input {
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-main);
            padding: 0.75rem;
            font-size: 1rem;
            width: 100%;
            transition: border-color 0.2s;
        }
        input:focus {
            outline: none;
            border-color: var(--primary-color);
        }
        button {
            background-color: #238636;
            color: #ffffff;
            border: 1px solid rgba(240,246,252,0.1);
            border-radius: 6px;
            padding: 0.75rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: #2ea44f;
        }
        .link-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .link-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 0;
            border-bottom: 1px solid var(--border-color);
        }
        .link-item:last-child {
            border-bottom: none;
        }
        .link-name {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 500;
            font-size: 1.1rem;
        }
        .link-name:hover {
            text-decoration: underline;
        }
        .btn-delete {
            background-color: transparent;
            color: var(--danger-color);
            border: 1px solid var(--danger-color);
            padding: 0.4rem 0.8rem;
            font-size: 0.85rem;
            border-radius: 6px;
        }
        .btn-delete:hover {
            background-color: var(--danger-color);
            color: #ffffff;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>專屬網址管理員</h1>
    
    <div class="input-group">
        <input type="text" id="linkName" placeholder="輸入網址名稱 (例如: Google)">
        <input type="text" id="linkUrl" placeholder="輸入網址 URL (例如: https://www.google.com)">
        <button onclick="addLink()">新增網址</button>
    </div>

    <ul id="linkList" class="link-list">
        </ul>
</div>

<script>
    // 🌟 修正點：確保 DOM 完全載入後，自動讀取並渲染 localStorage 的資料
    document.addEventListener('DOMContentLoaded', function() {
        renderLinks();
    });

    function addLink() {
        const nameInput = document.getElementById('linkName');
        const urlInput = document.getElementById('linkUrl');
        
        const name = nameInput.value.trim();
        let url = urlInput.value.trim();

        if (!name || !url) {
            alert("請填寫完整的名稱與網址！");
            return;
        }

        // 自動幫漏填 http 的網址補上協定
        if (!/^https?:\/\//i.test(url)) {
            url = 'https://' + url;
        }

        const links = getLinks();
        links.push({ id: Date.now(), name: name, url: url });
        localStorage.setItem('myLinks', JSON.stringify(links));

        nameInput.value = '';
        urlInput.value = '';
        
        // 自動聚焦回名稱輸入框，方便連續輸入
        nameInput.focus();
        
        renderLinks();
    }

    function deleteLink(id) {
        let links = getLinks();
        links = links.filter(link => link.id !== id);
        localStorage.setItem('myLinks', JSON.stringify(links));
        renderLinks();
    }

    function getLinks() {
        try {
            const linksJson = localStorage.getItem('myLinks');
            return linksJson ? JSON.parse(linksJson) : [];
        } catch (e) {
            console.error("無法自 localStorage 讀取資料", e);
            return [];
        }
    }

    function renderLinks() {
        const linkList = document.getElementById('linkList');
        if (!linkList) return; // 防禦性機制
        
        const links = getLinks();
        linkList.innerHTML = '';

        if (links.length === 0) {
            linkList.innerHTML = '<li style=\"text-align: center; color: var(--text-muted); border: none; padding: 1rem 0;\">目前尚無網址，請從上方新增。</li>';
            return;
        }

        links.forEach(link => {
            const li = document.createElement('li');
            li.className = 'link-item';
            
            li.innerHTML = `
                <a href="${escapeHtml(link.url)}" target="_blank" class="link-name">${escapeHtml(link.name)}</a>
                <button class="btn-delete" onclick="deleteLink(${link.id})">刪除</button>
            `;
            linkList.appendChild(li);
        });
    }

    // 防止 XSS 攻擊的字元跳脫安全機制
    function escapeHtml(str) {
        return str.replace(/&/g, "&amp;")
                  .replace(/</g, "&lt;")
                  .replace(/>/g, "&gt;")
                  .replace(/"/g, "&quot;")
                  .replace(/'/g, "&#039;");
    }
</script>

</body>
</html>
